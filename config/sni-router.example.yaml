# sni-router example configuration.
# Copy to /etc/sni-router/sni-router.yaml and adjust.
# Validate any time (never binds ports, safe next to a live instance):
#   sni-router -t

listeners:
  - name: main_tls
    bind:                       # one listener can accept on several addresses
      - "0.0.0.0:443"
      - "[::]:443"
    proto: tcp                  # tcp | udp (udp = QUIC passthrough)
    # Optional access control (deny wins; an empty allow list means "any").
    # acl:
    #   allow_ip: ["10.0.0.0/8", "192.168.1.5"]
    #   deny_ip:  ["10.0.0.66"]
    #   allow_sni: ["*.example.com"]
    #   deny_sni:  ["blocked.example.com"]
    routes:                     # first match wins
      - sni: "example.com"
        backend: web_main
      - sni: "*.example.com"    # any subdomain depth, NOT example.com itself
        backend: web_main
      - sni: "*"                # catch-all (also catches clients without SNI)
        backend: default_pool

backends:
  web_main:
    mode: passthrough           # passthrough | terminate — what THIS backend expects
    proxy_protocol: v2          # none | v1 | v2 — how to pass the real client IP
    balance: round_robin        # round_robin | least_conn
    health_check: true          # TCP connect probe (default: false)
    servers:
      - "10.0.0.1:443"
      - "10.0.0.2:443"

  default_pool:                 # minimal backend: everything defaulted
    servers:
      - "10.0.0.9:443"

  # TLS termination example (mode: terminate — TCP/HTTP only):
  # api_terminate:
  #   mode: terminate
  #   tls:                              # cert the router presents to clients
  #     cert: "/etc/sni-router/certs/api.example.org.pem"
  #     key: "/etc/sni-router/certs/api.example.org.key"
  #   backend_tls:                      # optional: re-encrypt to the backend
  #     sni: "api.internal"             #   name to send/verify (default: client SNI)
  #     ca: "/etc/sni-router/certs/backend-ca.pem"   # trust this CA (default: system roots)
  #     # insecure_skip_verify: true    #   skip verification (test only)
  #     # client_cert: "/etc/.../client.pem"   # mTLS to the backend
  #     # client_key:  "/etc/.../client.key"
  #   headers:
  #     x_real_ip: true
  #     x_forwarded_for: true
  #     x_forwarded_proto: true
  #   balance: least_conn
  #   servers:
  #     - "10.0.1.5:8080"

# Global timeouts, seconds (defaults shown).
timeouts:
  handshake: 5                  # max time to read ClientHello (slowloris protection)
  connect: 10                   # backend connect timeout
  idle: 300                     # idle connection timeout
