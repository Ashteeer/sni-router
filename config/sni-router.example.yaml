# sni-router example configuration.
# Copy to /etc/sni-router/sni-router.yaml and adjust.
# Validate any time (never binds ports, safe next to a live instance):
#   sni-router -t

listeners:
  - name: main_tls
    bind:                       # one listener can accept on several addresses
      - "0.0.0.0:443"
      - "[::]:443"
    proto: tcp                  # tcp | udp (udp = QUIC passthrough)
    # fast_open: true           # accept TCP Fast Open (tcp only): returning
                                # clients send the ClientHello in the SYN, saving
                                # an RTT. Needs sysctl net.ipv4.tcp_fastopen=3.
    # Optional access control (deny wins; an empty allow list means "any").
    # acl:
    #   allow_ip: ["10.0.0.0/8", "192.168.1.5"]
    #   deny_ip:  ["10.0.0.66"]
    #   allow_sni: ["*.example.com"]
    #   deny_sni:  ["blocked.example.com"]
    routes:                     # first match wins
      - sni: "example.com"
        backend: web_main
      - sni: "*.example.com"    # any subdomain depth, NOT example.com itself
        backend: web_main
      - sni: "*"                # catch-all (also catches clients without SNI)
        backend: default_pool

  # Plain HTTP on :80 that 301-redirects everything to https:// (Envoy parity).
  # - name: http_redirect
  #   bind: ["0.0.0.0:80", "[::]:80"]
  #   proto: tcp
  #   routes:
  #     - sni: "*"
  #       backend: to_https

  # DNS-over-TLS on :853: terminate TLS, hand the backend raw TCP DNS.
  # - name: dot
  #   bind: ["0.0.0.0:853"]
  #   proto: tcp
  #   routes:
  #     - sni: "*"
  #       backend: dot_backend

backends:
  web_main:
    mode: passthrough           # passthrough | terminate — what THIS backend expects
    proxy_protocol: v2          # none | v1 | v2 — how to pass the real client IP
    balance: round_robin        # round_robin | least_conn
    health_check: true          # per-backend TCP connect probe (default: false).
                                # On failure a server is skipped; connects always
                                # retry the next server in the pool regardless.
    servers:
      - "10.0.0.1:443"
      - "10.0.0.2:443"

  default_pool:                 # minimal backend: everything defaulted
    servers:
      - "10.0.0.9:443"

  # TLS termination example (mode: terminate — TCP/HTTP only):
  # api_terminate:
  #   mode: terminate
  #   tls:                              # cert the router presents to clients
  #     cert: "/etc/sni-router/certs/api.example.org.pem"
  #     key: "/etc/sni-router/certs/api.example.org.key"
  #   backend_tls:                      # optional: re-encrypt to the backend
  #     sni: "api.internal"             #   name to send/verify (default: client SNI)
  #     ca: "/etc/sni-router/certs/backend-ca.pem"   # trust this CA (default: system roots)
  #     # insecure_skip_verify: true    #   skip verification (test only)
  #     # client_cert: "/etc/.../client.pem"   # mTLS to the backend
  #     # client_key:  "/etc/.../client.key"
  #   http2: true                       # advertise & terminate h2 (gatewayed to
  #                                     #   the backend over HTTP/1.1; not with backend_tls)
  #   headers:
  #     x_real_ip: true
  #     x_forwarded_for: true
  #     x_forwarded_proto: true
  #   balance: least_conn
  #   servers:
  #     - "10.0.1.5:8080"
  #   # Optional per-path rules (first match wins; no rules = forward everything).
  #   # action: forward | respond | redirect. The SAME rules work on a
  #   # redirect_https (plaintext) backend too — synthetic 404/301 anywhere.
  #   http_rules:
  #     - path: "/dns-query"          # forward this path to the servers above
  #       action: forward
  #     - path: "/old"                # 301/302/... to another URL
  #       action: redirect
  #       to: "https://example.com/new"
  #       status: 301                 # optional, default 301
  #     - path: "*"                   # answer everything else directly
  #       action: respond
  #       status: 404
  #       body: "not found\n"
  #       content_type: "text/plain"

  # Plaintext responder on :80. With no http_rules it 301-redirects everything
  # to https (the common one-liner). Add http_rules for custom 404/301 on :80.
  # to_https:
  #   mode: redirect_https
  #   # http_rules:                    # optional; e.g. serve /health, redirect the rest
  #   #   - { path: "/health", action: respond, status: 200, body: "ok\n" }
  #   #   - { path: "*", action: redirect, to: "https" }   # "https" = same host+path over https

  # DoT / raw-TCP terminate: strip TLS, forward raw bytes to a DNS-over-TCP
  # server. Optional proxy_protocol passes the real client IP.
  # dot_backend:
  #   mode: terminate_tcp
  #   proxy_protocol: none
  #   tls:
  #     cert: "/etc/sni-router/certs/dns.example.org.pem"
  #     key: "/etc/sni-router/certs/dns.example.org.key"
  #   servers:
  #     - "10.0.2.5:53"

# Shared certificate for terminate backends. Any backend using mode: terminate
# or terminate_tcp that does NOT set its own `tls:` falls back to this one — handy
# when many backends share a single wildcard cert. A backend's own `tls:` wins.
# default_tls:
#   cert: "/etc/sni-router/certs/wildcard.pem"
#   key: "/etc/sni-router/certs/wildcard.key"

# Global timeouts, seconds (defaults shown).
timeouts:
  handshake: 5                  # max time to read ClientHello (slowloris protection)
  connect: 10                   # backend connect timeout
  idle: 300                     # idle connection timeout
  health_interval: 10           # how often to run health-check probes
  drain: 30                     # on SIGTERM, how long to wait for active conns

# Resource limits.
limits:
  max_client_hello: 16384       # max bytes buffered while reassembling ClientHello
  max_conns_per_ip: 0           # max concurrent TCP connections per client IP (0 = off)

# Logging.
log:
  level: info                   # error | warn | info | debug | trace (RUST_LOG overrides)
  format: text                  # text | json (json = one object per line, for log shippers)

# Management + metrics API (optional) — one bind, one token, control plane for a
# web UI. When `token` is set, EVERY endpoint requires `Authorization: Bearer`.
#   reads : GET  /status  /config  /healthz  /metrics   (Prometheus text)
#   writes: PUT  /config   (validate + replace file + apply)
#           POST /reload    (re-read config from disk)
#           POST /restart   (re-exec the process now)
# The installer generates `bind` (0.0.0.0:<random free port>) and `token`
# automatically. Set `tls` (or default_tls) to serve it over HTTPS.
# api:
#   bind: "0.0.0.0:9000"
#   token: "change-me"          # Bearer token; guards every endpoint, redacted in /config
#   # tls:                       # serve the API over HTTPS (else default_tls, else plaintext)
#   #   cert: "/etc/sni-router/certs/api.pem"
#   #   key:  "/etc/sni-router/certs/api.key"

# Reload without a restart: `kill -HUP <pid>` (or `systemctl reload sni-router`)
# re-reads this file, validates it, and applies route/backend/timeout/acl changes
# to new connections. Invalid configs are rejected and the running one keeps
# serving. Changing listener bind addresses still requires a restart.
#
# Graceful shutdown: `kill -TERM <pid>` stops accepting new connections and waits
# up to `timeouts.drain` seconds for active ones to finish before exiting.
