name: sni-router
base: core24                 # Ubuntu 24.04; sni-router supports 24.04 and newer only.
# Keep in sync with Cargo.toml [package].version AND the GitHub release tag on
# every release (see CLAUDE.md).
version: '1.4.3'
summary: High-performance SNI-based L4 router (TCP/UDP/QUIC)
description: |
  sni-router routes TCP/UDP/QUIC connections by TLS SNI without terminating the
  handshake (optional terminate mode is also supported). io_uring data path,
  thread-per-core, zero-copy splice. Simple flat YAML config.

  The config lives at $SNAP_DATA/sni-router.yaml (validate with
  `sni-router -t`). The daemon starts once that file exists and is valid.

grade: stable
license: Apache-2.0

# Classic confinement, on purpose: strict confinement's seccomp allowlist does
# NOT permit io_uring (io_uring_setup/enter/register), so monoio would fall back
# to epoll and lose the whole point of the project. Classic runs unconfined, so
# io_uring, CPU pinning (sched_setaffinity) and privileged binds all work at full
# speed. Trade-off: classic snaps require manual Snap Store review before stable.
confinement: classic

platforms:
  amd64:
  arm64:

apps:
  sni-router:
    command: bin/sni-router
    daemon: simple
    install-mode: disable      # user provides config first, then `snap start`
    restart-condition: on-failure
    environment:
      SNI_ROUTER_CONFIG: $SNAP_DATA/sni-router.yaml

parts:
  sni-router:
    plugin: rust
    source: .
    # ring (rustls terminate mode) needs a C toolchain + perl to build.
    build-packages:
      - gcc
      - perl
